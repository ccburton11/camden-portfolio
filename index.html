/* ── Button ─────────────────────────────────────── */
function Button({ children, variant = 'coral', size = 'md', href, onClick, type = 'button', disabled }) {
  const [hov, setHov] = React.useState(false);
  const [press, setPress] = React.useState(false);
  const v = {
    coral:   { bg: hov ? 'var(--coral-dark)' : 'var(--coral)', color: '#fff', border: 'none' },
    teal:    { bg: hov ? 'var(--teal-dark)'  : 'var(--teal)',  color: '#fff', border: 'none' },
    yellow:  { bg: hov ? 'var(--yellow-dark)' : 'var(--yellow)', color: 'var(--ink)', border: 'none' },
    outline: { bg: hov ? 'var(--gray-100)' : 'transparent', color: 'var(--ink)', border: '2px solid var(--ink)' },
    'outline-white': { bg: hov ? 'rgba(255,255,255,0.15)' : 'transparent', color: '#fff', border: '2px solid #fff' },
    ghost:   { bg: hov ? 'var(--gray-100)' : 'transparent', color: 'var(--ink-muted)', border: 'none' },
  };
  const s = { sm: { fontSize: 'var(--sm)', padding: '7px 14px' }, md: { fontSize: '0.9375rem', padding: '10px 22px' }, lg: { fontSize: '1rem', padding: '13px 30px' } };
  const style = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: '6px',
    fontFamily: 'var(--font-sans)', fontWeight: 600, letterSpacing: '0.01em',
    cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1,
    borderRadius: 'var(--r-md)', whiteSpace: 'nowrap', transition: 'background var(--fast), transform var(--fast)',
    transform: press ? 'scale(0.97)' : 'none',
    background: v[variant].bg, color: v[variant].color, border: v[variant].border || 'none',
    ...s[size],
  };
  const h = {
    onMouseEnter: () => setHov(true), onMouseLeave: () => { setHov(false); setPress(false); },
    onMouseDown: () => setPress(true), onMouseUp: () => setPress(false),
  };
  if (href) return <a href={href} style={style} {...h}>{children}</a>;
  return <button type={type} style={style} disabled={disabled} onClick={onClick} {...h}>{children}</button>;
}

/* ── Chip ──────────────────────────────────────── */
function Chip({ children, color, bgColor }) {

}

/* ── Nav ────────────────────────────────────────── */
function Nav() {
  const [scrolled, setScrolled] = React.useState(false);

    return () => window.removeEventListener('scroll', h);

    <>
      <div className="stripe" />

  const dark   = DARK[colorIdx % DARK.length];

    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}

      <div style={{ height: '6px', background: accent }} />
      <div style={{ padding: '24px', display: 'flex', flexDirection: 'column', gap: '12px', flex: 1 }}>
        <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
          {project.tags.map((t, i) => <Chip key={i} color={dark} bgColor={pale}>{t}</Chip>)}
        </div>
        <div style={{ fontFamily: 'var(--font-serif)', fontWeight: 700, fontSize: 'var(--h3)', lineHeight: 1.3, color: 'var(--ink)' }}>{project.title}</div>
        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--xs)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: dark }}>{project.org}</div>
        <p style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--sm)', lineHeight: 1.65, color: 'var(--ink-muted)', margin: 0 }}>{project.description}</p>
        {open && (
          <div style={{ borderTop: '1px solid var(--border-light)', paddingTop: '14px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
